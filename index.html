const { useState, useEffect, useRef } = React;

function usePersistentState(key, initialValue) {
  const [state, setState] = useState(() => {
    try {
      const item = window.localStorage.getItem(key);
      return item ? JSON.parse(item) : initialValue;
    } catch (error) {
      console.error("Error reading localStorage", error);
      return initialValue;
    }
  });
  useEffect(() => {
    window.localStorage.setItem(key, JSON.stringify(state));
  }, [key, state]);
  return [state, setState];
}

function ExerciseModal({ ex, onClose, t }) {
  const data = EXERCISE_META[ex.name] || {

    emoji: "🏋️", phases: ["Setup", "Execute"], steps: ["Position yourself properly.", "Perform the movement.", "Return to start."]
  };
  const [phase, setPhase] = useState(0);
  const [step, setStep] = useState(0);
  const intv = useRef(null);
  useEffect(() => {
    if (!data.phases || !data.phases.length) return;
    intv.current = setInterval(() => setPhase(p => (p+1) % data.phases.length), 1400);
    return () => clearInterval(intv.current);
  }, [data.phases]);
  useEffect(() => {
    if (!data.steps || !data.steps.length) return;
    setStep(phase < data.steps.length ? phase : data.steps.length-1);
  }, [phase, data.steps]);
  const Fig = FIGS[ex.animType];

  const imageToUse = ex.img || null;
  const dc={Intermediate:"#c8f135",Beginner:"#2cb67d",Advanced:"#ff4d6d"}[data.difficulty]||"#c8f135";
  const cc={Compound:"#7f5af0",Hinge:"#ff9a3c",Isolation:"#2cb67d",Unilateral:"#c8f135"}[data.category]||"#7f5af0";

// ─── HELPER RINGS ──────────────────────────────────────────────────────────────
function Ring({ pct, size=100, stroke=8, color="#c8f135" }) {
  const r=(size-stroke)/2, ci=2*Math.PI*r;
  const [off,setOff]=useState(ci);
  useEffect(()=>{setTimeout(()=>setOff(ci*(1-pct/100)),300);},[pct,ci]);
  return(<svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1e1e32" strokeWidth={stroke}/>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
      strokeDasharray={ci} strokeDashoffset={off} strokeLinecap="round"
      style={{transition:"stroke-dashoffset 1.2s ease"}}/>
  </svg>);
}
function MacroRing({ pct, color }) {
  const r=22,ci=2*Math.PI*r;
  const [off,setOff]=useState(ci);
  useEffect(()=>{setTimeout(()=>setOff(ci*(1-pct/100)),400);},[]);
  return(<svg width={60} height={60} viewBox="0 0 60 60" style={{transform:"rotate(-90deg)"}}>
    <circle cx={30} cy={30} r={r} fill="none" stroke="#1e1e32" strokeWidth={6}/>
    <circle cx={30} cy={30} r={r} fill="none" stroke={color} strokeWidth={6}
      strokeDasharray={ci} strokeDashoffset={off} strokeLinecap="round"
      style={{transition:"stroke-dashoffset 1s ease"}}/>
  </svg>);
}

            {/* ── PROFILE ── */}

                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,letterSpacing:2,color:t.text}}>ALEX MORGAN</div>
                <div style={{color:t.muted,fontFamily:"'Space Mono',monospace",fontSize:12,marginTop:2}}>@alexfits · Member since Jan 2025</div>
                <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap",marginTop:12}}>
                  <div className="badge gold">🏆 Top 5%</div>
                  <div className="badge green">🔥 7-Day</div>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:18}}>

                  <div key={i} className="card">
                    <div style={{fontSize:11,textTransform:"uppercase",letterSpacing:2,color:t.muted,fontFamily:"'Space Mono',monospace"}}>{l}</div>

                ))}
              </div>
              <div className="sec" style={{marginBottom:12}}>SETTINGS</div>

                  {icon:"🤖",label:"AI Coach Active",key:"ai",type:"toggle"},
                  {icon:"🎯",label:"Edit Goals",type:"link", desc:`${goals.days} Days/Week · ${goals.cals} kcal`},
                  {icon:"📊",label:"Export Data",type:"link"},
                  {icon:"🔒",label:"Privacy",type:"link"},
                  {icon:"❓",label:"Help & Support",type:"link"},
                ].map((s,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"15px 0",borderBottom:i<6?`1px solid ${t.border}`:"none",cursor:"pointer",transition:"all .2s"}}
                    onClick={()=>{if(s.type==="toggle")setToggles(tg=>({...tg,[s.key]:!tg[s.key]}));if(s.type==="link"){if(s.label==="Export Data")setShowPaywall(true);else setSettingModal(s.label);}if(s.action)s.action();}}>
                    <div style={{display:"flex",alignItems:"center",gap:12}}>
                      <div style={{fontSize:19}}>{s.icon}</div>
                      <div>
                        <div style={{fontSize:14,color:t.text}}>{s.label}</div>
                        {s.desc && <div style={{fontSize:11,color:t.muted,fontFamily:"'Space Mono',monospace",marginTop:2}}>{s.desc}</div>}
                      </div>
                    </div>
                    {s.type==="toggle" ? <div className={`toggle ${toggles[s.key]?"on":""}`}><div className="toggle-t"/></div>
                    :s.type==="special" ? <div className={`toggle ${s.val?"on":""}`}><div className="toggle-t"/></div>
                    :<div style={{color:t.muted}}>›</div>}
                  </div>
                ))}
              </div>
            </>)}

          </div>

          {/* BOTTOM NAV — 5 items (progress & ai removed, lives in topbar) */}
          <div className="bottom-nav" style={{display:"flex",justifyContent:"space-around",alignItems:"center",padding:"10px 0",background:t.surface,borderTop:`1px solid ${t.border}`}}>

              {id:"womens",icon:"🌸",label:"Women's"},
              {id:"nutrition",icon:"🥗",label:"Nutrition"},
              {id:"profile",icon:"👤",label:"Profile"},
            ].map(n=>(
              <div key={n.id} onClick={()=>setTab(n.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,cursor:"pointer", padding:"8px 14px", borderRadius:16, background:tab===n.id?"rgba(200,241,53,0.15)":"transparent", color:tab===n.id?t.accent:t.muted, transition:"all 0.2s"}}>
                <div style={{fontSize:20, transform:tab===n.id?"scale(1.1)":"scale(1)", transition:"all 0.2s"}}>{n.icon}</div>
                <div style={{fontSize:10,fontWeight:tab===n.id?700:500}}>{n.label}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {selEx && <ExerciseModal ex={selEx} onClose={()=>setSelEx(null)} t={t}/>}
      {selRecipe && <RecipeModal recipe={selRecipe} onClose={()=>setSelRecipe(null)} t={t}/>}
      {settingModal && <SettingModal title={settingModal} onClose={()=>setSettingModal(null)} t={t} goals={goals} setGoals={setGoals} setChartTooltip={setChartTooltip}/>}
      {showPaywall && <PaywallModal onClose={()=>setShowPaywall(false)} t={t}/>}
      
      {/* Fancy Bar Chart Tooltip */}
      {chartTooltip && (
        <div onClick={() => setChartTooltip(null)} style={{position:"fixed",inset:0,zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.7)",animation:"fadeIn .2s ease",backdropFilter:"blur(4px)",padding:20}}>
          <div onClick={e=>e.stopPropagation()} style={{background:t.surface,padding:"30px 24px",borderRadius:24,border:`1px solid ${t.border}`,textAlign:"center",minWidth:280,animation:"scaleIn .2s ease",boxShadow:"0 20px 50px rgba(0,0,0,0.5)"}}>
            <div style={{fontFamily:"'Space Mono',monospace",fontSize:13,color:t.muted,textTransform:"uppercase",letterSpacing:1.5,marginBottom:12}}>{chartTooltip.title}</div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:64,color:t.accent,lineHeight:1,marginBottom:6}}>{chartTooltip.value}</div>
            <div style={{fontSize:15,color:t.text}}>Recorded for {chartTooltip.day}</div>
            <button onClick={() => setChartTooltip(null)} style={{marginTop:24,width:"100%",padding:14,background:t.card2,color:t.text,border:`1px solid ${t.border}`,borderRadius:14,fontFamily:"'Bebas Neue',sans-serif",fontSize:20,letterSpacing:1,cursor:"pointer",transition:"all .2s"}}>CLOSE</button>
          </div>
        </div>
      )}
    </>
  );
}

    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",animation:"fadeIn .2s ease",padding:20}}>

                {q:"Can I use FitForge offline?",a:"Yes, your logged workouts sync when you reconnect. However, AI Coach features require an active connection."},

             <div style={{fontSize:40,marginBottom:16}}>📊</div>
             <div style={{color:t.text,marginBottom:16}}>Export your workout history, progress tracking, and nutrition logs to a CSV file.</div>
             <button onClick={()=>{alert("Exporting data..."); onClose();}} style={{width:"100%",padding:14,background:t.card2,border:`1px solid ${t.border}`,borderRadius:12,color:t.text,fontFamily:"'Bebas Neue',sans-serif",fontSize:20,letterSpacing:1}}>DOWNLOAD CSV</button>
          </div>
        )}

        {title === "Privacy" && (
          <div style={{color:t.muted,fontSize:14,lineHeight:1.6}}>
             <div style={{color:t.text,fontWeight:600,marginBottom:8}}>Data Collection</div>
             <div style={{marginBottom:16}}>FitForge stores your workout data locally on your device. We do not sell your personal health data to third parties.</div>
             <div style={{color:t.text,fontWeight:600,marginBottom:8}}>Analytics</div>
             <div style={{marginBottom:16}}>We collect anonymous crash reports to improve the app. You can opt out in Settings.</div>
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<FitForge />);
    </script>
</body>
</html>
